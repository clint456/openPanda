# ============================================================
# docker-compose.yml — 本地开发环境（纯 HTTP，无 SSL）
#
# 使用方式:
#   docker-compose up -d        # 后台启动所有服务
#   docker-compose down         # 停止所有服务
#   docker-compose logs -f      # 查看日志
#   docker-compose build        # 重新构建镜像
#
# 注意: 开发环境使用 nginx.dev.conf（HTTP-only），
#       生产环境使用 docker-compose.prod.yml（HTTPS + SSL）。
# ============================================================

services:
  # ============================================================
  # PostgreSQL 数据库
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: openpanda-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-openpanda}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data  # 数据持久化
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 缓存
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: openpanda-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Gin 后端服务
  # ============================================================
  backend:
    build:
      context: ../Backend
      dockerfile: Dockerfile
    container_name: openpanda-backend
    restart: always
    ports:
      - '8080:8080'
    environment:
      SERVER_PORT: '8080'
      GIN_MODE: debug
      SITE_URL: 'http://localhost'
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: openpanda
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Shanghai
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ''
      JWT_SECRET: ${JWT_SECRET:-openpanda-dev-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # Vite 前端服务（Nginx）
  # ============================================================
  frontend:
    build:
      context: ../Frontend
      dockerfile: Dockerfile
    container_name: openpanda-frontend
    restart: always
    ports:
      - '80:80'
    volumes:
      # 开发环境使用 HTTP-only 配置覆盖默认 HTTPS 配置
      - ../Frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

# ============================================================
# 数据卷（持久化存储）
# ============================================================
volumes:
  pg_data:
  redis_data:
  uploads_data:
