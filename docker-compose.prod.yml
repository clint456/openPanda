# ============================================================
# docker-compose.prod.yml — 生产环境
#
# 服务器首次部署:
#   export DOCKERHUB_USER=clintonluo
#   mkdir -p /data/openpanda/{pgdata,uploads,backups,redis,ssl}
#   docker-compose -f docker-compose.prod.yml up -d
#
# 后续更新:
#   docker-compose -f docker-compose.prod.yml pull backend frontend
#   docker-compose -f docker-compose.prod.yml up -d --no-deps backend frontend
#
# 数据全部存储在宿主机 /data/openpanda/ 下，
# 不受容器删除/重建/软件更新影响。
# ============================================================
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: openpanda-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-openpanda}
    ports:
      - '127.0.0.1:5432:5432'   # 仅本地访问，安全加固
    volumes:
      - /data/openpanda/pgdata:/var/lib/postgresql/data
      - /data/openpanda/backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: openpanda-redis
    restart: always
    ports:
      - '127.0.0.1:6379:6379'   # 仅本地访问
    volumes:
      - /data/openpanda/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKERHUB_USER:-clintonluo}/openpanda-backend:latest
    container_name: openpanda-backend
    restart: always
    ports:
      - '8080:8080'
    environment:
      SERVER_PORT: '8080'
      GIN_MODE: release
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-openpanda}
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Shanghai
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ''
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-strong-secret-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?请设置 ADMIN_PASSWORD 环境变量}
    volumes:
      - /data/openpanda/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${DOCKERHUB_USER:-clintonluo}/openpanda-frontend:latest
    container_name: openpanda-frontend
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /data/openpanda/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

# 不使用命名卷 —— 全部 bind mount 到 /data/openpanda/
