# ============================================================
# docker-compose.yml - 一键编排前后端 + 数据库 + 缓存
#
# 使用方式:
#   docker-compose up -d        # 后台启动所有服务
#   docker-compose down         # 停止所有服务
#   docker-compose logs -f      # 查看日志
#   docker-compose build        # 重新构建镜像
# ============================================================
version: '3.8'

services:
  # ============================================================
  # PostgreSQL 数据库
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: openpanda-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openpanda
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data  # 数据持久化
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 缓存
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: openpanda-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Gin 后端服务
  # ============================================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: openpanda-backend
    restart: always
    ports:
      - '8080:8080'
    environment:
      SERVER_PORT: '8080'
      GIN_MODE: release
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: openpanda
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Shanghai
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ''
      JWT_SECRET: change-me-to-a-strong-secret-in-production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # Vite 前端服务（Nginx）
  # ============================================================
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: openpanda-frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend

# ============================================================
# 数据卷（持久化存储）
# ============================================================
volumes:
  pg_data:
  redis_data:
  uploads_data:
