# ============================================================
# GitHub Actions CI/CD — 自动构建 & 部署到服务器
#
# 触发条件: 推送到 main 分支
#
# 前置准备（在 GitHub 仓库 Settings → Secrets → Actions 中配置）:
#   DOCKERHUB_USERNAME     DockerHub 用户名
#   DOCKERHUB_TOKEN        DockerHub Access Token
#   SSH_HOST               服务器 IP
#   SSH_USER               服务器 SSH 用户 (如 root)
#   SSH_PASSWORD           服务器 SSH 密码
#   SSH_PORT               服务器 SSH 端口 (默认 22)
#   DB_USER                数据库用户名
#   DB_PASSWORD            数据库密码
#   JWT_SECRET             JWT 签名密钥 (node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")
#   ADMIN_USERNAME         管理员登录用户名
#   ADMIN_PASSWORD         管理员登录密码
#   SITE_URL               站点 URL（如 https://openpanda.your-domain.com）
# ============================================================
name: Build & Deploy

on:
  push:
    branches: [main, master]
  # 允许手动触发
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: 构建并推送 Docker 镜像
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ---------- 登录 DockerHub ----------
      - name: 登录 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------- 构建 & 推送后端镜像（Dockerfile 内多阶段编译，无需手动交叉编译） ----------
      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/openpanda-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/openpanda-backend:${{ github.sha }}

      # ---------- 构建 & 推送前端镜像 ----------
      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/openpanda-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/openpanda-frontend:${{ github.sha }}

  # ============================================================
  # Job 2: SSH 连接服务器并更新服务
  # ============================================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 先把最新的部署文件上传到服务器
      - name: 同步 deploy/ 到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: deploy/
          target: /root/openPanda/
          overwrite: true

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # 在服务器上执行的部署脚本
          script: |
            set -e  # 任何命令失败则立即退出
            cd /root/openPanda

            echo "========== 更新环境变量 =========="
            cat > .env << 'ENVEOF'
            DOCKERHUB_USER=${{ secrets.DOCKERHUB_USERNAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=openpanda
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            SITE_URL=${{ secrets.SITE_URL }}
            ENVEOF

            # 确保 .env 没有 Windows 换行符
            sed -i 's/\r$//' .env

            echo "========== 拉取最新镜像 =========="
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/openpanda-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/openpanda-frontend:latest

            echo "========== 检测 docker compose 命令 =========="
            if docker compose version &>/dev/null; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose &>/dev/null && docker-compose version &>/dev/null; then
              COMPOSE_CMD="docker-compose"
            else
              echo "❌ 错误: 未找到可用的 docker compose，请先安装 Docker Compose 插件"
              exit 1
            fi
            echo "使用: $COMPOSE_CMD"

            echo "========== 重启服务（强制重建容器以加载新环境变量） =========="
            $COMPOSE_CMD --env-file .env -f deploy/docker-compose.prod.yml up -d --no-deps --force-recreate backend frontend

            echo "========== 清理旧镜像（保留正在使用的镜像） =========="
            docker image prune -af

            echo "========== 部署完成！ =========="
